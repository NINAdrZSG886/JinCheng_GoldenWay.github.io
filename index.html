<!DOCTYPE html>
<html>
<body>

<button onclick="connect()">连接蓝牙</button>

<script>
async function connect() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true
    });

    console.log("设备:", device.name);

    const server = await device.gatt.connect();
    console.log("已连接");

  } catch (e) {
    console.error(e);
  }
}
</script>

</body>
</html>
